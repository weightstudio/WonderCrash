<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Animal Guard Yard cover">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop stop-color="#173957"/>
      <stop offset=".45" stop-color="#4c7543"/>
      <stop offset="1" stop-color="#23361f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#fff2a8"/>
      <stop offset=".48" stop-color="#f7b943"/>
      <stop offset="1" stop-color="#8b4d1d"/>
    </linearGradient>
    <linearGradient id="banner" x1="0" x2="0" y1="0" y2="1">
