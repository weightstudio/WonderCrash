    <text x="600" y="150" text-anchor="middle" font-family="Arial Rounded MT Bold, Noto Sans TC, sans-serif" font-size="64" font-weight="900" fill="#1a304b" stroke="#ffffff" stroke-width="7" paint-order="stroke">Animal Guard Yard</text>
